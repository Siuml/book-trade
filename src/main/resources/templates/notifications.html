<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/layout :: head(#{notification.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 th:text="#{notification.title}">消息通知</h4>
        <a th:if="${notifications != null and !notifications.isEmpty()}"
           th:href="@{/notifications/read-all}" class="btn btn-sm btn-outline-secondary"
           th:text="#{notification.markAllRead}">全部标为已读</a>
    </div>

    <div th:if="${notifications != null and !notifications.isEmpty()}">
        <div class="list-group">
            <div th:each="notif : ${notifications}"
                 th:classappend="${notif.isRead == 0} ? 'list-group-item list-group-item-light' : 'list-group-item'"
                 class="list-group-item d-flex justify-content-between align-items-start">
                <div class="flex-grow-1">
                    <div class="d-flex align-items-center">
                        <span th:if="${notif.isRead == 0}" class="badge bg-danger me-2" style="width:8px;height:8px;border-radius:50%;padding:0;"></span>
                        <strong th:text="${notif.title}">标题</strong>
                        <span class="badge ms-2" 
                              th:classappend="${notif.type == 'order'} ? 'bg-info' : (${notif.type == 'comment'} ? 'bg-success' : 'bg-secondary')"
                              th:text="${notif.type == 'order' ? '订单' : (notif.type == 'comment' ? '留言' : '系统')}">类型</span>
                    </div>
                    <p class="mt-2 mb-1" th:text="${notif.content}">内容</p>
                    <small class="text-muted" th:text="${#temporals.format(notif.createTime, 'yyyy-MM-dd HH:mm')}">时间</small>
                </div>
                <a th:if="${notif.isRead == 0}"
                   th:href="@{/notifications/read/{id}(id=${notif.id})}"
                   class="btn btn-sm btn-outline-primary ms-2"
                   th:text="#{notification.markRead}">标为已读</a>
            </div>
        </div>
    </div>

    <div th:if="${notifications == null or notifications.isEmpty()}" class="text-center text-muted py-5">
        <p th:text="#{notification.empty}">暂无通知</p>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
