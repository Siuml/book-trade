<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/layout :: head(#{payment.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div th:replace="~{fragments/layout :: alert-error}"></div>
    <div th:if="${order != null}" class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white"><h5 class="mb-0" th:text="#{payment.title}">确认付款</h5></div>
                <div class="card-body">
                    <div class="mb-3"><strong th:text="#{myorders.orderid}">订单编号：</strong><span th:text="${order.orderNo}">订单号</span></div>
                    <div class="mb-3"><strong th:text="#{payment.amount}">付款金额：</strong><span class="price" th:text="'¥' + ${order.price}">0.00</span></div>
                    <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">
                        <div class="mb-3">
                            <label class="form-label" th:text="#{payment.method}">付款方式</label>
                            <select class="form-select" name="payMethod">
                                <option value="card" th:text="#{payment.method.card}">信用卡支付</option>
                                <option value="bank" th:text="#{payment.method.bank}">银行转账</option>
                                <option value="wallet" th:text="#{payment.method.wallet}">电子钱包</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{payment.submit}">确认付款</button>
                    </form>
                    <p class="text-muted mt-3 mb-0 small" th:text="#{payment.note}">付款完成后，请等待卖家确认发货</p>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${order == null}" class="text-center text-muted py-5"><p>订单不存在或无法付款</p></div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
