<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{profile.edit.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>

    <h4 class="mb-3" th:text="#{profile.edit.title}">Edit Profile</h4>

    <div class="card shadow">
        <div class="card-body p-4">
            <form th:action="@{/profile/edit}" method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="#{profile.username}">Username</label>
                    <input type="text" class="form-control" name="username" th:value="${user.username}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{profile.nickname}">Nickname</label>
                    <input type="text" class="form-control" name="nickname" th:value="${user.nickname}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{profile.phone}">Phone</label>
                    <input type="text" class="form-control" name="phone" th:value="${user.phone}">
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{profile.email}">Email</label>
                    <input type="email" class="form-control" name="email" th:value="${user.email}">
                </div>
                <div class="d-flex justify-content-between">
                    <a th:href="@{/profile}" class="btn btn-secondary" th:text="#{common.cancel}">Cancel</a>
                    <button type="submit" class="btn btn-primary" th:text="#{common.save}">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
