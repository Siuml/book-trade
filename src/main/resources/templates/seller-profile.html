<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/layout :: head(#{seller.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>

    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="me-3">
                            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:64px;height:64px;font-size:24px;">
                                <span th:text="${seller.nickname != null ? #strings.substring(seller.nickname,0,1) : '?'}">?</span>
                            </div>
                        </div>
                        <div>
                            <h4 th:text="${seller.nickname}">卖家昵称</h4>
                            <p class="text-muted mb-0">
                                <span th:text="#{seller.memberSince}">注册于</span>
                                <span th:text="${#temporals.format(seller.createTime, 'yyyy-MM-dd')}">日期</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <h5 class="mb-3" th:text="#{seller.books(${seller.nickname})}">TA 的在售书籍</h5>

    <div class="row" th:if="${books != null and !books.isEmpty()}">
        <div class="col-md-4 mb-4" th:each="book : ${books}">
            <div class="card book-card h-100">
                <img th:if="${book.coverImage}" th:src="${book.coverImage}" class="card-img-top book-cover" alt="封面">
                <div th:unless="${book.coverImage}" class="book-cover-placeholder d-flex align-items-center justify-content-center">
                    <span class="text-muted" th:text="${book.title}">书名</span>
                </div>
                <div class="card-body">
                    <h6 class="card-title" th:text="${book.title}">书名</h6>
                    <p class="card-text text-muted small" th:text="${book.author}">作者</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="price">¥<span th:text="${book.price}">0.00</span></span>
                        <span th:if="${book.condition == 0}" class="badge bg-success" th:text="#{book.condition.new}">全新</span>
                        <span th:if="${book.condition == 1}" class="badge bg-info" th:text="#{book.condition.good}">良好</span>
                        <span th:if="${book.condition == 2}" class="badge bg-warning" th:text="#{book.condition.fair}">一般</span>
                    </div>
                    <a th:href="@{/book/detail/{id}(id=${book.id})}" class="btn btn-outline-primary btn-sm d-block mt-2" th:text="#{index.viewdetail}">查看详情</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${books == null or books.isEmpty()}" class="text-center text-muted py-5">
        <p th:text="#{seller.noBooks}">该卖家暂无在售书籍</p>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
